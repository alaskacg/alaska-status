name: trinity-health
# Auto-generated by ~/scripts/setup_repo_auto_management.py
# Daily probe + Trinity/Morpheus notification hook.

on:
  schedule:
    - cron: "30 10 * * *"   # 02:30 AKST daily
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Report build/state to Trinity portfolio hook
        env:
          REPO: ${{ github.repository }}
          SHA:  ${{ github.sha }}
          REF:  ${{ github.ref }}
          EVENT: ${{ github.event_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # Post a lightweight status event. Hook is only reachable from
          # Trinity-tunneled runners; failure is non-fatal (never block CI).
          cat > /tmp/event.json <<EOF
          {
            "source": "github-actions",
            "kind": "trinity-health",
            "repo": "${REPO}",
            "sha": "${SHA}",
            "ref": "${REF}",
            "event": "${EVENT}",
            "run_id": "${RUN_ID}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat /tmp/event.json
          # Attempt delivery; ignore failures.
          curl -sS --max-time 10 \
            -H "Content-Type: application/json" \
            -X POST \
            --data @/tmp/event.json \
            "${TRINITY_HOOK}" || echo "(hook unreachable, non-fatal)"
        continue-on-error: true
