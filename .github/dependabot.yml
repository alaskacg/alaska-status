version: 2
# Auto-generated by ~/scripts/setup_repo_auto_management.py
# Safe to edit — the script only rewrites when content drifts.
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Anchorage"
    open-pull-requests-limit: 5
    labels: ["dependencies", "automated"]
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      dev-dependencies:
        dependency-type: "development"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["ci", "automated"]
